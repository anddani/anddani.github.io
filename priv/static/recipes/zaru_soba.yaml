:title: Zaru Soba
:tags:
  - japanese
  - cold
  - noodles
:ingredients:
  - soba noodles
  - 1 part mentsuyu
  - 2 parts water
  - spring onion
  - protein (such as dumplings)
:instructions: |
  1. Cook soba noodles according to package instructions.
  2. Mix mentsuyu and water in a small dipping bowl.
  3. Add spring onion to dipping bow.
  4. Drain noodles and rinse under cold water until cool.
  5. Serve noodles with dipping sauce and protein.
