:title: Chili
:tags:
  - spicy
  - hot
:ingredients:
  - 1 lbs meat (+ other proteins like sausage)
  - 1 tbsp butter or lard
  - 1 1/2 large onion
  - 3 cloves garlic or 1 tbsp garlic powder
  - 2 cans tomato sauce
  - 1/2 or 1 small can of chipotle sauce
  - 2 tbsp chili powder
  - 2 tbsp cumin
  - 2 tbsp cocoa
  - 2 tsp oregano
  - 2 tsp black pepper
  - 2 tsp cayenne
  - 1 tsp salt (to taste)
  - 1 can pinto beans
  - 1 can black beans
  - 1 can kidney beans
  - corn, carrot
:instructions: |
