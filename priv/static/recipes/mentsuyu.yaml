:title: Mentsuyu
:tags:
  - japanese
  - cold
:ingredients:
  - 1dl sake
  - 2dl mirin
  - 2dl soy sauce
  - 1 dm² kombu
  - 35g katsuobushi
:instructions: |
  1. Mix sake, mirin, and soy sauce in a small saucepan.
  2. Bring to a boil.
  3. Turn off the heat, add kombu, and cover with a lid.
  4. Set timer to 15 minutes.
  5. Remove kombu.
  6. Bring to a boil again.
  7. Turn off the heat, add katsuobushi, and cover with a lid.
  8. Set timer to 15 minutes.
  9. Remove katsuobushi.
