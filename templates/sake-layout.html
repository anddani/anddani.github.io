<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$title$ — sake.log</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .sakura-bg {
      background-color: #fdf6f0;
      position: relative;
      isolation: isolate;
    }
    .sakura-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png'),
        url('/assets/petal.png');
      background-repeat: no-repeat;
      background-position:
        4% 6%, 14% 15%, 20% 28%, 32% 42%, 42% 14%, 52% 24%, 58% 42%, 70% 8%,
        28% 58%, 45% 70%, 66% 28%, 82% 42%, 78% 68%, 18% 78%, 60% 85%, 90% 88%;
      background-size:
        48px, 42px, 44px, 38px, 40px, 46px, 52px, 44px,
        38px, 42px, 46px, 40px, 44px, 36px, 48px, 40px;
    }
    [data-theme=dark] .sakura-bg {
      background-color: #1a1218;
    }
    [data-theme=dark] .sakura-bg::before {
      opacity: 0.18;
    }
    .prose p { margin-top: 1em; margin-bottom: 1em; line-height: 1.75; }
    .prose h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; }
    .prose ul { list-style: disc; padding-left: 1.5em; margin-top: 0.5em; margin-bottom: 0.5em; }
    .prose li { margin-top: 0.25em; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose blockquote { border: 2px solid; border-color: #d1d5db #4b5563 #4b5563 #d1d5db; background: rgba(253,246,240,0.8); padding: 0 1em; margin: 1em 0; font-style: normal; }
    .prose blockquote p:first-child::before { content: "※ "; }
    [data-theme=dark] .prose blockquote { background: rgba(40,30,25,0.8); border-color: #57534e #292524 #292524 #57534e; }
  </style>
</head>

<body class="sakura-bg font-mincho min-h-screen text-stone-900 dark:text-stone-100">

  <!-- Theme toggle (top-right, fixed) -->
  <button id="theme-toggle"
    class="fixed right-3 top-3 z-50 cursor-pointer border-2 border-b-gray-600 border-l-gray-300 border-r-gray-600 border-t-gray-300 bg-stone-50 px-3 py-1 text-sm font-mincho active:border-b-gray-300 active:border-l-gray-600 active:border-r-gray-300 active:border-t-gray-600 dark:bg-stone-800 dark:text-stone-100">
    ◐
  </button>

  <div class="mx-auto max-w-3xl px-6 py-12">

    <!-- Back link -->
    <a href="/sake.log" class="text-sm text-stone-500 hover:text-stone-800 dark:text-stone-400 dark:hover:text-stone-200">← sake.log</a>

    <!-- Header -->
    <div class="mt-6 mb-8 flex flex-col sm:flex-row gap-6 items-start">
      $if(image)$
      <img src="$image$" alt="$title$" class="w-[300px] shrink-0 border-2 border-b-gray-600 border-l-gray-300 border-r-gray-600 border-t-gray-300" />
      $endif$
      <div class="flex flex-col gap-2">
        <h1 class="text-3xl font-bold">$title$</h1>
        <p class="text-sm text-stone-500 dark:text-stone-400">$date$</p>
        <p class="text-base font-bold">★ $rating$ / 5</p>
      </div>
    </div>

    <!-- Metadata table -->
    <div class="border-2 border-b-gray-600 border-l-gray-300 border-r-gray-600 border-t-gray-300 bg-white/60 dark:bg-stone-900/60 mb-8">
      <table class="w-full text-sm">
        <tbody>
          $if(type)$
          <tr class="border-b border-stone-200 dark:border-stone-700">
            <td class="px-4 py-2 font-bold text-stone-500 dark:text-stone-400 w-32">Type</td>
            <td class="px-4 py-2">$type$</td>
          </tr>
          $endif$
          $if(polish)$
          <tr class="border-b border-stone-200 dark:border-stone-700">
            <td class="px-4 py-2 font-bold text-stone-500 dark:text-stone-400 w-32">Polish</td>
            <td class="px-4 py-2">$polish$</td>
          </tr>
          $endif$
          $if(abv)$
          <tr class="border-b border-stone-200 dark:border-stone-700">
            <td class="px-4 py-2 font-bold text-stone-500 dark:text-stone-400 w-32">ABV</td>
            <td class="px-4 py-2">$abv$</td>
          </tr>
          $endif$
          $if(smv)$
          <tr class="border-b border-stone-200 dark:border-stone-700">
            <td class="px-4 py-2 font-bold text-stone-500 dark:text-stone-400 w-32">SMV</td>
            <td class="px-4 py-2">$smv$</td>
          </tr>
          $endif$
          $if(acidity)$
          <tr class="border-b border-stone-200 dark:border-stone-700">
            <td class="px-4 py-2 font-bold text-stone-500 dark:text-stone-400 w-32">Acidity</td>
            <td class="px-4 py-2">$acidity$</td>
          </tr>
          $endif$
          $if(notes)$
          <tr>
            <td class="px-4 py-2 font-bold text-stone-500 dark:text-stone-400 w-32">Notes</td>
            <td class="px-4 py-2">$notes$</td>
          </tr>
          $endif$
        </tbody>
      </table>
    </div>

    <!-- Review body -->
    <div class="prose">
      $body$
    </div>

  </div>

  <script>
    document.querySelectorAll('.prose a').forEach(function(a) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });
  </script>
  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      var html = document.documentElement;
      var stored = localStorage.getItem("theme");
      if (stored) html.setAttribute("data-theme", stored);
      btn.addEventListener("click", function () {
        var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      });
    })();
  </script>
</body>

</html>
